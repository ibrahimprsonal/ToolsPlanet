<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Currency Converter - Tools Planet</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global Style -->
    <link rel="stylesheet" href="../../style.css">
    <!-- Local Style -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../../" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>

    <div class="converter-wrapper">
        <div class="converter-box glass">
            <div class="converter-header">
                <h2><i class="fa-solid fa-money-bill-trend-up"></i> Currency Converter Dashboard</h2>
                <p class="subtitle">Professional Real-time Market Exchange Rates</p>
            </div>
            
            <div class="converter-body">
                <!-- Left Column: Inputs -->
                <div class="converter-left">
                    <div class="input-section">
                        <label for="amount">Amount to Convert</label>
                        <div class="amount-input-wrapper">
                            <span class="currency-symbol" id="from-symbol">$</span>
                            <input type="number" id="amount" value="1.00" min="0" step="any" placeholder="Enter amount">
                        </div>
                    </div>

                    <div class="currency-selection-row">
                        <!-- From Currency -->
                        <div class="currency-group">
                            <label>From</label>
                            <div class="custom-select" id="from-select-container">
                                <div class="select-selected" id="from-selected">
                                    <span class="flag-icon" id="from-flag">🇺🇸</span>
                                    <span class="currency-code" id="from-code-display">USD</span>
                                    <i class="fa-solid fa-chevron-down"></i>
                                </div>
                                <div class="select-items hide" id="from-dropdown">
                                    <div class="search-box">
                                        <i class="fa-solid fa-magnifying-glass"></i>
                                        <input type="text" placeholder="Search currency..." id="from-search">
                                    </div>
                                    <div class="options-list" id="from-options-list">
                                        <!-- Options injected via JS -->
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Swap Button -->
                        <div class="swap-wrapper">
                            <button class="swap-btn" id="swap-btn" title="Swap Currencies">
                                <i class="fa-solid fa-arrow-right-arrow-left"></i>
                            </button>
                        </div>

                        <!-- To Currency -->
                        <div class="currency-group">
                            <label>To</label>
                            <div class="custom-select" id="to-select-container">
                                <div class="select-selected" id="to-selected">
                                    <span class="flag-icon" id="to-flag">🇧🇩</span>
                                    <span class="currency-code" id="to-code-display">BDT</span>
                                    <i class="fa-solid fa-chevron-down"></i>
                                </div>
                                <div class="select-items hide" id="to-dropdown">
                                    <div class="search-box">
                                        <i class="fa-solid fa-magnifying-glass"></i>
                                        <input type="text" placeholder="Search currency..." id="to-search">
                                    </div>
                                    <div class="options-list" id="to-options-list">
                                        <!-- Options injected via JS -->
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Results -->
                <div class="converter-right">
                    <div class="result-card glass-panel">
                        <div class="conversion-text">
                            <span id="base-amount-text">1.00 USD =</span>
                        </div>
                        <div class="final-result" id="final-result">
                            <span id="target-symbol">৳</span><span id="converted-amount">...</span> <span id="target-code">BDT</span>
                        </div>
                        
                        <div class="divider"></div>
                        
                        <div class="market-rate-container">
                            <div class="market-rate-info">
                                <i class="fa-solid fa-chart-line"></i> 
                                <span id="rate-info">1 USD = ... BDT</span>
                            </div>
                            <div class="market-status">Live Market Rate</div>
                        </div>
                        
                        <div class="converter-footer">
                            <i class="fa-regular fa-clock"></i>
                            <span id="last-updated">Fetching live rates...</span>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
