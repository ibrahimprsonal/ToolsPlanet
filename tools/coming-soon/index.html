<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: var(--surface-color);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            max-width: 400px;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 20px;
            color: var(--accent-color);
        }
        h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
        p { color: var(--text-secondary); font-size: 0.95rem; }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: var(--text-secondary);
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover { color: var(--text-primary); border-color: var(--accent-color); }
    </style>
</head>
<body>
    <a href="../../" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    <div class="container">
        <div class="icon"><i class="fa-solid fa-hammer"></i></div>
        <h1>Coming Soon</h1>
        <p>This tool is currently under construction.</p>
    </div>
</body>
</html>
