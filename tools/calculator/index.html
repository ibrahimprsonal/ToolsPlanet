<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .calculator {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--card-shadow);
            width: 320px;
        }
        .display {
            background: #09090b;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            padding: 20px;
            text-align: right;
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--text-primary);
            min-height: 80px;
            word-wrap: break-word;
            font-family: monospace;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        button {
            border: 1px solid transparent;
            padding: 16px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            background: var(--hover-bg);
            color: var(--text-primary);
            transition: all 0.2s;
            font-weight: 500;
        }
        button:hover { background: #3f3f46; border-color: var(--border-color); }
        button:active { transform: scale(0.95); }
        .operator { background: var(--accent-glow); color: var(--accent-color); border: 1px solid var(--accent-glow); }
        .operator:hover { background: var(--accent-color); color: white; }
        .equals { background: #10b981; color: white; grid-column: span 2; }
        .equals:hover { background: #059669; }
        .clear { background: #ef4444; color: white; }
        .clear:hover { background: #dc2626; }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: var(--text-secondary);
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-btn:hover { color: var(--text-primary); border-color: var(--accent-color); }
    </style>
</head>
<body>
    <a href="../../" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="append('/')">÷</button>
            <button onclick="append('*')">×</button>
            <button class="operator" onclick="append('-')">−</button>
            
            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button class="operator" onclick="append('+')">+</button>
            
            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button class="equals" style="grid-row: span 3;" onclick="calculate()">=</button>
            
            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            
            <button style="grid-column: span 2;" onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        let current = '';

        function append(val) {
            if(current === '0' && val !== '.') current = '';
            current += val;
            updateDisplay();
        }

        function clearDisplay() {
            current = '0';
            updateDisplay();
        }

        function calculate() {
            try {
                // Warning: eval is used for simple demo purposes. In production, use a math parser.
                current = eval(current).toString();
            } catch (e) {
                current = 'Error';
            }
            updateDisplay();
        }

        function updateDisplay() {
            display.innerText = current || '0';
        }
    </script>
</body>
</html>
