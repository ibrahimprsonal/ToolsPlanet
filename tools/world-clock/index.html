<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../style.css">
    <style>
        .page-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .clock-container {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--card-shadow);
            width: 100%;
            max-width: 900px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        
        .header h1 i {
            color: var(--accent-color);
            margin-right: 12px;
        }
        
        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        
        .clocks {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
        }
        
        .clock-card {
            background: rgba(9, 9, 11, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .clock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent-color);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .clock-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 15px var(--accent-glow);
            background: var(--hover-bg);
        }
        
        .clock-card:hover::before {
            opacity: 1;
        }
        
        .city {
            font-size: 1.15rem;
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .clock-card:hover .city {
            color: var(--text-primary);
        }
        
        .city i {
            color: var(--accent-color);
            opacity: 0.8;
        }
        
        .time {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.5px;
        }
        
        .date {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .back-btn:hover {
            background: var(--hover-bg) !important;
            color: var(--text-primary) !important;
            border-color: var(--accent-color) !important;
            box-shadow: 0 0 15px var(--accent-glow);
        }
    </style>
</head>
<body>
    <!-- Background and Back Button -->
    <a href="../../index.html" class="back-btn" style="position: absolute; top: 20px; left: 20px; text-decoration: none; color: var(--text-secondary); background: var(--surface-color); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 6px; font-size: 0.9rem; transition: all 0.2s; display: flex; align-items: center; gap: 8px; z-index: 100;">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>
    
    <div class="page-wrapper">
        <div class="clock-container glass">
            <div class="header">
                <h1><i class="fa-solid fa-globe"></i>World Clock</h1>
                <p>Track the time across major global cities</p>
            </div>
            <div class="clocks" id="clocks">
                <!-- Clocks injected via JS -->
            </div>
        </div>
    </div>

    <script>
        const cities = [
            { name: 'Local Time', timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone, icon: 'fa-location-dot' },
            { name: 'New York', timeZone: 'America/New_York', icon: 'fa-building' },
            { name: 'London', timeZone: 'Europe/London', icon: 'fa-tree-city' },
            { name: 'Tokyo', timeZone: 'Asia/Tokyo', icon: 'fa-torii-gate' },
            { name: 'Sydney', timeZone: 'Australia/Sydney', icon: 'fa-bridge-water' }
        ];

        function updateClocks() {
            const container = document.getElementById('clocks');
            let html = '';
            
            const now = new Date();

            cities.forEach(city => {
                const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: city.timeZone, hour12: true };
                const dateOptions = { weekday: 'short', month: 'short', day: 'numeric', timeZone: city.timeZone };
                
                const timeString = new Intl.DateTimeFormat('en-US', timeOptions).format(now);
                const dateString = new Intl.DateTimeFormat('en-US', dateOptions).format(now);

                html += `
                    <div class="clock-card">
                        <div class="city"><i class="fa-solid ${city.icon}"></i> ${city.name}</div>
                        <div class="time">${timeString}</div>
                        <div class="date">${dateString}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        updateClocks();
        setInterval(updateClocks, 1000);
    </script>
</body>
</html>
