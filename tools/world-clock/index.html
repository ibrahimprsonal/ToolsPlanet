<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
        }
        .clock-container {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 600px;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            color: #38bdf8;
        }
        .clocks {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        .clock-card {
            background: rgba(15, 23, 42, 0.7);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s;
        }
        .clock-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.5);
        }
        .city {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #94a3b8;
        }
        .time {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .date {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 4px;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #f8fafc;
            background: rgba(51, 65, 85, 0.6);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.3s;
            z-index: 100;
        }
        .back-btn:hover { background: rgba(71, 85, 105, 0.9); }
    </style>
</head>
<body>
    <!-- Background decoration -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <a href="../../index.html" class="back-btn">⬅ Back to Home</a>
    
    <div class="clock-container">
        <div class="header">
            <h1>World Clock</h1>
        </div>
        <div class="clocks" id="clocks">
            <!-- Clocks injected via JS -->
        </div>
    </div>

    <script>
        const cities = [
            { name: 'Local', timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
            { name: 'New York', timeZone: 'America/New_York' },
            { name: 'London', timeZone: 'Europe/London' },
            { name: 'Tokyo', timeZone: 'Asia/Tokyo' },
            { name: 'Sydney', timeZone: 'Australia/Sydney' }
        ];

        function updateClocks() {
            const container = document.getElementById('clocks');
            let html = '';
            
            const now = new Date();

            cities.forEach(city => {
                const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: city.timeZone, hour12: true };
                const dateOptions = { weekday: 'short', month: 'short', day: 'numeric', timeZone: city.timeZone };
                
                const timeString = new Intl.DateTimeFormat('en-US', timeOptions).format(now);
                const dateString = new Intl.DateTimeFormat('en-US', dateOptions).format(now);

                html += `
                    <div class="clock-card">
                        <div class="city">${city.name}</div>
                        <div class="time">${timeString}</div>
                        <div class="date">${dateString}</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        updateClocks();
        setInterval(updateClocks, 1000);
    </script>
</body>
</html>
